<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a4a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>月払い管理</title>
<link rel="manifest" href="#" id="manifest-link">
<style>
:root{
  --bg:#f0f4f8;--card:#fff;--primary:#1a3a4a;--primary-light:#2a5a72;
  --accent:#e8a020;--accent2:#3aaa7a;--danger:#d94040;
  --text:#1a2530;--text-sub:#556070;--border:#d0dce8;--row-even:#f7fafc;
  --shadow:0 2px 12px rgba(0,0,0,.10);--tab-h:58px;--header-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:15px}

/* ── HEADER ── */
#app-header{
  position:fixed;top:0;left:0;right:0;z-index:100;height:var(--header-h);
  background:var(--primary);display:flex;align-items:center;justify-content:space-between;
  padding:0 10px;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.25);
}
#header-title{color:#fff;font-size:15px;font-weight:700;white-space:nowrap}
.hbtn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:#2a5a72;color:#fff;border:none;border-radius:7px;
  padding:5px 8px;cursor:pointer;font-size:9px;font-family:inherit;font-weight:700;
  box-shadow:0 3px 0 #0d2a36;transform:translateY(0);
  transition:box-shadow .08s,transform .08s;white-space:nowrap;min-width:44px;
}
.hbtn:active{box-shadow:0 1px 0 #0d2a36;transform:translateY(2px)}
.hbtn svg{width:16px;height:16px}

/* ── TAB BAR ── */
#tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--tab-h);
  background:var(--primary);display:flex;box-shadow:0 -2px 10px rgba(0,0,0,.18);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:rgba(255,255,255,.45);background:none;border:none;cursor:pointer;
  font-family:inherit;padding:4px 0 6px;
}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:22px;height:22px}
.tab-label{font-size:10px;letter-spacing:.03em}

/* ── MAIN ── */
#main{
  position:fixed;top:var(--header-h);bottom:var(--tab-h);left:0;right:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.tab-content{display:none;padding:10px 10px 14px}
.tab-content.active{display:block}

/* ── CARDS ── */
.card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.card-header{
  background:var(--primary);color:#fff;padding:9px 13px;font-size:12px;
  font-weight:700;display:flex;align-items:center;gap:7px;letter-spacing:.04em;
}
.card-body{padding:12px}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.form-full{grid-column:1/-1}
label{display:block;font-size:10px;color:var(--text-sub);margin-bottom:3px;font-weight:600;letter-spacing:.04em}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-size:15px;font-family:inherit;background:#f8fbff;color:var(--text);
  transition:border-color .2s;appearance:none;-webkit-appearance:none;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary-light);background:#fff}
textarea{resize:vertical;min-height:56px}

/* 金額入力欄（通常の入力欄と同スタイル） */
.amount-input-display{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;
  background:#f8fbff;color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:border-color .2s;
}
.amount-input-display:active,.amount-input-display.focus{border-color:var(--primary-light);background:#fff}
.amount-input-display .placeholder{color:#aab;font-weight:400;font-size:14px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:11px 16px;border-radius:8px;border:none;cursor:pointer;
  font-size:14px;font-family:inherit;font-weight:700;
  letter-spacing:.03em;transition:opacity .15s,transform .1s;
}
.btn:active{opacity:.8;transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-accent{background:var(--accent);color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text-sub)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-block{width:100%}
.btn-row{display:flex;gap:8px;margin-top:10px}

/* ── RATIO TOGGLE ── */
.ratio-toggle-row{display:flex;gap:8px;width:fit-content}
.ratio-toggle{
  padding:10px 28px;border:none;border-radius:8px;
  background:#e4eaf0;color:var(--text-sub);font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit;letter-spacing:.04em;
  box-shadow:0 3px 0 #b0bec8,0 4px 8px rgba(0,0,0,.10);
  transform:translateY(0);transition:background .15s,color .15s,box-shadow .1s,transform .1s;
}
.ratio-toggle:active{box-shadow:0 1px 0 #b0bec8;transform:translateY(2px)}
.ratio-toggle.active{background:var(--primary);color:#fff;box-shadow:0 3px 0 #0d2230,0 4px 10px rgba(26,58,74,.28)}
.ratio-toggle.active:active{box-shadow:0 1px 0 #0d2230;transform:translateY(2px)}

/* ── TENKEY MODAL ── */
#tenkey-modal{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.5);align-items:center;justify-content:center;
}
#tenkey-modal.open{display:flex}
.tenkey-sheet{
  background:#fff;border-radius:20px;padding:20px 16px 16px;
  width:calc(100% - 40px);max-width:360px;
  box-shadow:0 8px 40px rgba(0,0,0,.28);
  animation:fadeScaleIn .18s ease;
}
@keyframes fadeScaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.tenkey-title{
  text-align:center;font-size:15px;font-weight:700;
  color:var(--primary);margin-bottom:12px;letter-spacing:.04em;
}
.tenkey-disp{
  background:#f4f6fa;color:var(--text);border:1.5px solid var(--border);border-radius:12px;
  padding:14px 18px;margin-bottom:14px;
  font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;
  text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center;
}
.tkey-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tkey{
  background:#eef1f6;color:var(--text);border:none;border-radius:12px;
  font-size:22px;font-weight:700;font-family:inherit;padding:15px 0;
  cursor:pointer;box-shadow:0 3px 0 #c4cad6;
  transform:translateY(0);transition:box-shadow .08s,transform .08s,background .1s;
  user-select:none;
}
.tkey:active{box-shadow:0 1px 0 #c4cad6;transform:translateY(2px);background:#dde2ea}
.tkey-wide{grid-column:span 1}
.tkey-del{background:#ffe8e8;color:#d94040;box-shadow:0 3px 0 #e0b8b8}
.tkey-del:active{box-shadow:0 1px 0 #e0b8b8;transform:translateY(2px)}
.tkey-clear{background:#ffe8e8;color:#d94040;box-shadow:0 3px 0 #e0b8b8}
.tkey-clear:active{box-shadow:0 1px 0 #e0b8b8;transform:translateY(2px)}
.tkey-action-row{display:flex;gap:10px;margin-top:12px}
.tkey-cancel{
  flex:1;background:#eef1f6;color:var(--text-sub);border:none;border-radius:12px;
  font-size:16px;font-weight:700;font-family:inherit;padding:15px 0;
  cursor:pointer;box-shadow:0 3px 0 #c4cad6;
  transform:translateY(0);transition:box-shadow .08s,transform .08s;
}
.tkey-cancel:active{box-shadow:0 1px 0 #c4cad6;transform:translateY(2px)}
.tkey-ok{
  flex:2;background:var(--primary);color:#fff;border:none;border-radius:12px;
  font-size:16px;font-weight:700;font-family:inherit;padding:15px 0;
  cursor:pointer;box-shadow:0 3px 0 #0d2230;
  transform:translateY(0);transition:box-shadow .08s,transform .08s;
}
.tkey-ok:active{box-shadow:0 1px 0 #0d2230;transform:translateY(2px)}


/* ── 保存・読込モーダル ── */
#save-modal,#load-modal{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.5);align-items:center;justify-content:center;
}
#save-modal.open,#load-modal.open{display:flex}
.io-sheet{
  background:#fff;border-radius:20px;padding:22px 18px 18px;
  width:calc(100% - 40px);max-width:360px;
  box-shadow:0 8px 40px rgba(0,0,0,.28);
  animation:fadeScaleIn .18s ease;
}
.io-title{
  text-align:center;font-size:16px;font-weight:700;color:var(--primary);
  margin-bottom:16px;
}
.io-info{
  background:#f4f6fa;border-radius:10px;padding:12px 14px;
  font-size:13px;color:var(--text-sub);margin-bottom:14px;
  line-height:1.6;
}
.io-info strong{color:var(--text);font-weight:700}
.io-action-row{display:flex;gap:10px;margin-top:4px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--primary);color:#fff;padding:7px 6px;text-align:left;font-size:10px;letter-spacing:.04em;white-space:nowrap}
td{padding:7px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:nth-child(even) td{background:var(--row-even)}
tr:last-child td{border-bottom:none}
.amount{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.amount.negative{color:var(--danger)}
.td-date{white-space:nowrap;font-size:11px;color:var(--text-sub)}
.td-payee{font-weight:600}
.td-note{font-size:10px;color:var(--text-sub);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:4px;color:var(--text-sub);font-size:15px}

/* ── MONTH NAV ── */
.month-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;background:var(--primary-light);border-radius:10px;margin-bottom:10px;color:#fff;
}
.month-nav-title{font-size:16px;font-weight:700;letter-spacing:.05em}
.month-nav-btn{
  background:rgba(255,255,255,.18);border:none;border-radius:6px;color:#fff;
  font-size:20px;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;
}
.month-nav-btn:active{background:rgba(255,255,255,.35)}

/* ── SUMMARY ── */
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.summary-row:last-child{border-bottom:none}
.summary-label{color:var(--text-sub)}
.summary-value{font-weight:700;font-variant-numeric:tabular-nums}
.summary-total{font-size:15px;color:var(--primary)}
.summary-billing{font-size:16px;color:var(--primary);font-weight:800}

/* ── TAGS ── */
.tag{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700}
.tag-monthly{background:#e0f0ff;color:#1a6aaa}
.tag-yearly{background:#fff0d0;color:#aa6a00}
.tag-bimonthly{background:#e8ffe0;color:#2a8a40}
.tag-other{background:#f0e0ff;color:#6a20aa}

/* ── SETTINGS ── */
.setting-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.setting-item:last-child{border-bottom:none}
.setting-info{flex:1}
.setting-name{font-weight:600;font-size:13px}
.setting-sub{font-size:10px;color:var(--text-sub);margin-top:2px}
.setting-amount{font-weight:700;font-variant-numeric:tabular-nums;color:var(--primary);font-size:13px;margin-left:6px}

/* ── YEAR LIST ── */
.year-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.year-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.year-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.payee-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.payee-bar:last-child{border-bottom:none}
.payee-name{font-weight:600;font-size:13px}
.payee-count{font-size:10px;color:var(--text-sub)}
.payee-total{font-weight:700;font-variant-numeric:tabular-nums;color:var(--primary);font-size:13px}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:14px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.25);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.modal-header{background:var(--primary);color:#fff;padding:12px 14px;border-radius:14px 14px 0 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1}
.modal-body{padding:14px}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--tab-h)+12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--primary);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:400;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:28px 14px;color:var(--text-sub)}
.empty-icon{font-size:36px;margin-bottom:8px}
.empty-text{font-size:13px}

/* ── PRINT ── */
@media print{
  #app-header,#tab-bar,#tenkey-modal,.modal-overlay,.no-print{display:none!important}
  #main{position:static!important;overflow:visible!important;top:0!important;bottom:0!important}
  .tab-content{display:none!important}
  #tab-report{display:block!important;padding:0!important}
  .card{box-shadow:none!important;border:1px solid #ccc!important;margin-bottom:8px!important;break-inside:avoid}
  .card-header{background:none!important;color:#000!important;border-bottom:2px solid #333!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  th{background:none!important;color:#000!important;border-bottom:1.5px solid #333!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .month-nav{background:#eee!important;color:#000!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#fff!important}
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="app-header">
  <span id="header-title">💴 月払い管理</span>
  <div id="header-month-nav" style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px">
    <button class="hbtn" style="min-width:32px;padding:5px 7px;font-size:16px" onclick="changeReportMonth(-1)">‹</button>
    <span id="header-month" style="color:var(--accent);font-size:17px;font-weight:700;white-space:nowrap;min-width:88px;text-align:center"></span>
    <button class="hbtn" style="min-width:32px;padding:5px 7px;font-size:16px" onclick="changeReportMonth(1)">›</button>
  </div>
  <div style="display:flex;gap:6px">
    <button class="hbtn" onclick="exportData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      保存
    </button>
    <button class="hbtn" onclick="importData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      読込
    </button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- TAB: 入力 -->
  <div id="tab-input" class="tab-content active">
    <div class="card">
      <div class="card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 5v14M5 12h14"/></svg>
        支払いを追加
      </div>
      <div class="card-body">
        <div class="form-grid">
          <div class="form-full">
            <label>月日</label>
            <input type="date" id="in-date">
          </div>
          <div>
            <label>金額（円）</label>
            <div class="amount-input-display" id="amount-display" onclick="openTenkey('main')">
              <span class="placeholder" id="amount-display-text">タップして入力</span>
              <span style="font-size:13px;color:#aab">▼</span>
            </div>
            <input type="hidden" id="in-amount" value="">
          </div>
          <div class="form-full">
            <label>支払先</label>
            <input type="text" id="in-payee" placeholder="例：関西電力" list="payee-list">
            <datalist id="payee-list"></datalist>
          </div>
          <div class="form-full">
            <label>用途</label>
            <input type="text" id="in-purpose" placeholder="例：電気代 1月分">
          </div>
          <div class="form-full">
            <label>備考</label>
            <input type="text" id="in-note" placeholder="例：2/6引落">
          </div>
          <div class="form-full">
            <label>請求分</label>
            <div class="ratio-toggle-row">
              <button class="ratio-toggle active" id="in-ratio-50" onclick="setInputRatio(50)">50%</button>
              <button class="ratio-toggle" id="in-ratio-100" onclick="setInputRatio(100)">100%</button>
            </div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary btn-block" onclick="addEntry()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>
            追加する
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header" id="quick-summary-header">📊 今月のサマリー</div>
      <div class="card-body" id="quick-summary"></div>
    </div>

    <div class="card" id="periodic-suggestion" style="display:none">
      <div class="card-header" id="periodic-suggestion-header">🔄 今月の定期支払い</div>
      <div class="card-body" id="periodic-suggestion-body"></div>
    </div>
  </div>

  <!-- TAB: 月次 -->
  <div id="tab-report" class="tab-content">
    <div class="card">
      <div class="card-header">📋 支払い一覧</div>
      <div class="card-body" style="padding:0">
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>月日</th><th>支払先</th><th>用途</th>
              <th style="text-align:right">金額</th><th>請求</th><th>備考</th>
              <th class="no-print">操作</th>
            </tr></thead>
            <tbody id="report-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">💰 集計</div>
      <div class="card-body" id="report-summary"></div>
    </div>
    <button class="btn btn-outline btn-block no-print" onclick="window.print()" style="margin-bottom:8px">🖨️ 印刷する</button>
  </div>

  <!-- TAB: 設定 -->
  <div id="tab-settings" class="tab-content">
    <div class="card">
      <div class="card-header">🔄 定期支払いを追加</div>
      <div class="card-body">
        <div class="form-grid">
          <div class="form-full"><label>支払先</label><input type="text" id="sp-payee" placeholder="例：NHK"></div>
          <div class="form-full"><label>用途</label><input type="text" id="sp-purpose" placeholder="例：受信料 年一括払い"></div>
          <div>
            <label>金額（円）</label>
            <div class="amount-input-display" id="sp-amount-display" onclick="openTenkey('sp')">
              <span class="placeholder" id="sp-amount-display-text">タップして入力</span>
              <span style="font-size:13px;color:#aab">▼</span>
            </div>
            <input type="hidden" id="sp-amount" value="">
          </div>
          <div><label>頻度</label>
            <select id="sp-freq">
              <option value="monthly">毎月</option>
              <option value="bimonthly">隔月</option>
              <option value="quarterly">3ヶ月ごと</option>
              <option value="yearly">年1回</option>
              <option value="semi-yearly">半年ごと</option>

function openTenkey(target){
  _tkTarget=target;

  const cur=target==='main'?document.getElementById('in-amount').value
            :target==='sp'?document.getElementById('sp-amount').value
            :document.getElementById('pedit-amount').value;
  _tkVal=(cur&&cur!=='0'&&cur!=='')?String(parseInt(cur)):'0';
  _tkRefresh();
  document.getElementById('tenkey-modal').classList.add('open');
}
function closeTenkey(){document.getElementById('tenkey-modal').classList.remove('open')}
function tkInput(d){
  if(_tkVal==='0')_tkVal=d;else _tkVal+=d;

}
function tkDel(){_tkVal=_tkVal.slice(0,-1)||'0';_tkRefresh();}
function tkClear(){_tkVal='0';_tkRefresh();}
function _tkRefresh(){
  const num=parseInt(_tkVal,10)||0;

}

// ── HELPERS ──
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function fmt(n){
  if(n===null||n===undefined||n==='')return'―';
  const num=Number(n);
  return(num<0?'−':'')+'¥'+Math.abs(num).toLocaleString('ja-JP');
}
function fmtDate(d){if(!d)return'';const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}`}
function ym(y,m){return y*100+m}
function entryYM(e){const d=new Date(e.date);return ym(d.getFullYear(),d.getMonth()+1)}
function getEntriesForMonth(y,m){return entries.filter(e=>entryYM(e)===ym(y,m)).sort((a,b)=>a.date.localeCompare(b.date))}
function calcBilling(list){
  const a50=list.filter(e=>(e.ratio_pct||50)===50).reduce((s,e)=>s+Number(e.amount||0),0);
  const a100=list.filter(e=>(e.ratio_pct||50)===100).reduce((s,e)=>s+Number(e.amount||0),0);
  return{a50,a100,billing:Math.round(a50*0.5)+a100};
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function freqLabel(f){return{monthly:'毎月',bimonthly:'隔月',quarterly:'3ヶ月ごと',yearly:'年1回','semi-yearly':'半年ごと'}[f]||f}
function freqTag(f){
  const cls={monthly:'tag-monthly',bimonthly:'tag-bimonthly',quarterly:'tag-other',yearly:'tag-yearly','semi-yearly':'tag-other'}[f]||'tag-other';
  return`<span class="tag ${cls}">${freqLabel(f)}</span>`;
}
function isPeriodicDue(p,y,m){
  if(p.freq==='monthly')return true;
  if(p.freq==='bimonthly')return m%2===p.month%2;
  if(p.freq==='quarterly')return(m-p.month)%3===0||(m+12-p.month)%3===0;
  if(p.freq==='yearly')return m===p.month;
  if(p.freq==='semi-yearly')return m===p.month||m===((p.month+5)%12)+1;
  return false;
}

  const dl=document.getElementById('payee-list');
  dl.innerHTML=[...new Set(entries.map(e=>e.payee).filter(Boolean))].map(p=>`<option value="${p}">`).join('');

function rateBadge(pct){
  return pct===100
    ?`<span style="background:#fff0d0;color:#aa6a00;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:700">100%</span>`
    :`<span style="background:#e0f0ff;color:#1a6aaa;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:700">50%</span>`;
}

function exportData(){

  const fname=`月払い管理_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  document.getElementById('save-filename').textContent=fname;

function closeSaveModal(){document.getElementById('save-modal').classList.remove('open')}
async function doExport(){
  const data={entries,periodics,yearlyMemos,exportedAt:new Date().toISOString()};
  const json=JSON.stringify(data,null,2);
  const d=new Date();
  const fname=`月払い管理_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  closeSaveModal();

  // showSaveFilePicker対応ブラウザ（Chrome等・HTTPS環境）
  if(window.showSaveFilePicker){
    try{
      const fh=await window.showSaveFilePicker({
        suggestedName:fname,
        types:[{description:'JSONファイル',accept:{'application/json':['.json']}}]
      });
      const writable=await fh.createWritable();
      await writable.write(json);
      await writable.close();
      showToast('✓ データを保存しました');
      return;
    }catch(e){
      if(e.name==='AbortError')return; // キャンセルは何もしない
      // SecurityError等は下のフォールバックへ
    }
  }
  // フォールバック（Safari・ローカルファイル等）
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=fname;a.click();
  URL.revokeObjectURL(url);
  showToast('✓ データを保存しました');
}

function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    let data;
    try{
      data=JSON.parse(ev.target.result);
    }catch{
      showToast('⚠ ファイルの形式が正しくありません');
      e.target.value='';
      return;
    }
    if(!confirm('現在のデータを読み込んだファイルで上書きします。よろしいですか？')){
      e.target.value='';
      return;
    }
    if(data.entries)entries=data.entries;
    if(data.periodics)periodics=data.periodics;
    if(data.yearlyMemos)yearlyMemos=data.yearlyMemos;
    sv(SK.entries,entries);sv(SK.periodic,periodics);sv(SK.memos,yearlyMemos);
    showToast('✓ データを読み込みました');
    switchTab(currentTab);
    e.target.value='';
  };
  reader.onerror=()=>{showToast('⚠ ファイルの読み込みに失敗しました');e.target.value='';};
  reader.readAsText(file);
}

if('serviceWorker' in navigator){
  const swCode=`
const CACHE='tsukibarai-v1';
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll([location.pathname||'/'])));self.skipWaiting()});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim()});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const rc=res.clone();caches.open(CACHE).then(c=>c.put(e.request,rc));return res}).catch(()=>caches.match(e.request))))});
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
