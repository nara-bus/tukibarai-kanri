// HAYAMIは wpd（1日の所定労働時間）から動的に生成する
const buildHayami = (wpd) => {
  const half = Math.floor(wpd / 2);
  return Array.from({length: 21}, (_, days) => {
    const remainMin = days * wpd;
    if (days === 0) return { days: 0, remainMin: 0, maxMin: 0, judgeMax: half };
    const prevRemain = (days - 1) * wpd;
    const maxMin = prevRemain + half + 1;
    const judgeMax = days === 20 ? days * wpd : days * wpd + half;
    return { days, remainMin, maxMin, judgeMax };
  });
};
